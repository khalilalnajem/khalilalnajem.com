// Load project

  document.getElementById('proj-label').textContent = p.label;
  document.getElementById('proj-title').textContent = p.title;
  document.getElementById('proj-body').innerHTML = p.body;

  let metaHtml = `<div class="proj-detail-status"><span class="status-dot ${p.active ? 'active' : ''}"></span> ${p.status}</div>`;
  p.meta.forEach(([k, v]) => {
    metaHtml += `<div class="proj-detail-meta-item"><label>${k}</label><span>${v}</span></div>`;
  });
  document.getElementById('proj-meta').innerHTML = metaHtml;

  // Links
  if (p.links.length) {
    let linksHtml = '';
    p.links.forEach(l => {
      linksHtml += `<a href="${l.url}" target="_blank" class="proj-detail-link">${l.label} →</a>`;
    });
    document.getElementById('proj-links').innerHTML = linksHtml;
  }

  // Photos
  if (p.photos.length) {
    let photosHtml = '';
    p.photos.forEach(src => {
      photosHtml += `<img src="${src}" alt="" class="proj-detail-photo" onclick="openLightbox('${src}')">`;
    });
    document.getElementById('proj-photos').innerHTML = photosHtml;
  }

  // Prev/Next navigation
  const idx = projectOrder.indexOf(id);
  const prevEl = document.getElementById('proj-prev');
  const nextEl = document.getElementById('proj-next');
  if (idx > 0) {
    const prevId = projectOrder[idx - 1];
    prevEl.href = `project.html?id=${prevId}`;
    prevEl.textContent = `← ${projects[prevId].title}`;
  } else {
    prevEl.style.visibility = 'hidden';
  }
  if (idx < projectOrder.length - 1) {
    const nextId = projectOrder[idx + 1];
    nextEl.href = `project.html?id=${nextId}`;
    nextEl.textContent = `${projects[nextId].title} →`;
  } else {
    nextEl.style.visibility = 'hidden';
  }
} else {
  document.getElementById('proj-title').textContent = 'Project not found';
  document.getElementById('proj-body').innerHTML = '<p>This project does not exist. <a href="projects.html">Back to projects</a>.</p>';
  document.querySelector('.proj-nav-arrows').style.display = 'none';
}

// Nav highlight

document.querySelectorAll('.nav-links a[href]').forEach(a => {
  if (a.getAttribute('href') === 'projects.html') a.style.color = 'var(--amber)';
});

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Page transition
document.addEventListener('click', e => {
  const a = e.target.closest('a[href]');
  if (!a || a.target === '_blank' || a.href.startsWith('mailto:') || a.href.includes('#')) return;
  if (new URL(a.href).origin !== location.origin) return;
  e.preventDefault();
  document.body.classList.add('page-exit');
  setTimeout(() => { window.location = a.href; }, 250);
});
